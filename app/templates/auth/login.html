{% extends "base.html" %}
{% block title %}登入 — AI 學習助理{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">

    <div class="text-center mb-4">
      <i class="bi bi-robot display-4 text-primary"></i>
      <h1 class="h3 mt-2 fw-bold">歡迎回來</h1>
      <p class="text-muted">登入以繼續學習</p>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form action="{{ url_for('auth.login_post') }}" method="POST" id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label fw-medium">電子郵件</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="email" name="email" class="form-control"
                     placeholder="your@email.com" required autofocus />
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-medium">密碼</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" name="password" class="form-control"
                     placeholder="••••••" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold" id="loginSubmit">
            <i class="bi bi-box-arrow-in-right me-1"></i> 登入
          </button>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      還沒有帳號？
      <a href="{{ url_for('auth.register') }}" class="text-primary fw-medium">立即註冊</a>
    </p>

  </div>
</div>
{% endblock %}
